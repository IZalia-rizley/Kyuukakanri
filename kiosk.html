<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>出退勤キオスク</title>
<style>
  :root {
    --grad: linear-gradient(135deg, #4fc3f7, #66bb6a);
    --bg: #121212;
    --card: #1e1e1e;
    --text: #e0e0e0;
    --sub: #9e9e9e;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "Hiragino Sans", "Yu Gothic UI", sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    cursor: default;
    user-select: none;
  }
  #scanInput {
    position: absolute;
    opacity: 0;
    pointer-events: none;
    left: -9999px;
  }
  .screen { display: none; text-align: center; width: 100%; max-width: 720px; padding: 24px; }
  .screen.active { display: block; }

  /* 待機画面 */
  #clock { font-size: 88px; font-weight: 200; letter-spacing: 2px; }
  #dateLine { font-size: 26px; color: var(--sub); margin-top: 4px; }
  #idleMsg {
    margin-top: 48px;
    font-size: 30px;
    background: var(--grad);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    font-weight: 600;
  }
  .pulse { animation: pulse 2.4s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .45; } }

  /* スタッフ画面 */
  #staffName { font-size: 52px; font-weight: 700; }
  #staffState { font-size: 24px; color: var(--sub); margin-top: 10px; }
  #staffDetail { font-size: 18px; color: var(--sub); margin-top: 6px; min-height: 24px; }
  .btn {
    display: block;
    width: 100%;
    margin-top: 28px;
    padding: 28px;
    font-size: 32px;
    font-weight: 700;
    border: none;
    border-radius: 20px;
    color: #fff;
    cursor: pointer;
  }
  .btn:active { transform: scale(.97); }
  .btn-checkin { background: linear-gradient(135deg, #43a047, #66bb6a); }
  .btn-otstart { background: linear-gradient(135deg, #ef6c00, #ffa726); }
  .btn-otend   { background: linear-gradient(135deg, #1565c0, #4fc3f7); }
  .btn-back {
    background: var(--card);
    color: var(--sub);
    font-size: 20px;
    padding: 16px;
    margin-top: 20px;
  }
  #doneMsg { font-size: 26px; margin-top: 36px; color: var(--sub); }

  /* 結果画面 */
  #resultIcon { font-size: 96px; }
  #resultText { font-size: 36px; font-weight: 700; margin-top: 20px; }
  #resultSub { font-size: 22px; color: var(--sub); margin-top: 10px; }

  #errBanner {
    position: fixed;
    top: 0; left: 0; right: 0;
    background: #c62828;
    color: #fff;
    padding: 14px;
    text-align: center;
    font-size: 18px;
    display: none;
  }
</style>
</head>
<body>

<div id="errBanner"></div>
<input type="text" id="scanInput" autocomplete="off">

<!-- 待機 -->
<div class="screen active" id="screenIdle">
  <div id="clock">--:--</div>
  <div id="dateLine"></div>
  <div id="idleMsg" class="pulse">QRコードをスキャンしてください</div>
</div>

<!-- スタッフ操作 -->
<div class="screen" id="screenStaff">
  <div id="staffName"></div>
  <div id="staffState"></div>
  <div id="staffDetail"></div>
  <div id="btnArea"></div>
  <div id="doneMsg" style="display:none;">本日の打刻はすべて完了しています</div>
  <button class="btn btn-back" onclick="goIdle()">← 戻る</button>
</div>

<!-- 結果 -->
<div class="screen" id="screenResult">
  <div id="resultIcon">✅</div>
  <div id="resultText"></div>
  <div id="resultSub"></div>
</div>

<script>
// ▼▼ デプロイ後にここだけ差し替え ▼▼
const GAS_URL = 'ここに出退勤GASの/exec URL';
// ▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲

const STATE_LABEL = {
  '未出勤': 'まだ出勤していません',
  '出勤済み': '出勤済みです',
  '時間外中': '時間外勤務 中です',
  '本日完了': '本日完了'
};

let resetTimer = null;
let busy = false;

// ---------- JSONP ----------
function jsonp(params) {
  return new Promise((resolve, reject) => {
    const cb = '_cb' + Date.now() + Math.floor(Math.random() * 10000);
    const timeout = setTimeout(() => { cleanup(); reject(new Error('タイムアウト')); }, 15000);
    function cleanup() {
      clearTimeout(timeout);
      delete window[cb];
      script.remove();
    }
    window[cb] = (data) => { cleanup(); resolve(data); };
    const qs = new URLSearchParams(params);
    qs.set('callback', cb);
    const script = document.createElement('script');
    script.src = GAS_URL + '?' + qs.toString();
    script.onerror = () => { cleanup(); reject(new Error('通信エラー')); };
    document.body.appendChild(script);
  });
}

// ---------- 画面制御 ----------
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goIdle() {
  clearTimeout(resetTimer);
  busy = false;
  show('screenIdle');
  focusScanner();
}

function armReset(ms) {
  clearTimeout(resetTimer);
  resetTimer = setTimeout(goIdle, ms);
}

function showError(msg) {
  const b = document.getElementById('errBanner');
  b.textContent = msg;
  b.style.display = 'block';
  setTimeout(() => { b.style.display = 'none'; }, 4000);
}

// ---------- 時計 ----------
function tickClock() {
  const n = new Date();
  document.getElementById('clock').textContent =
    String(n.getHours()).padStart(2, '0') + ':' + String(n.getMinutes()).padStart(2, '0');
  const days = ['日','月','火','水','木','金','土'];
  document.getElementById('dateLine').textContent =
    (n.getMonth() + 1) + '月' + n.getDate() + '日（' + days[n.getDay()] + '）';
}
setInterval(tickClock, 1000);
tickClock();

// ---------- スキャナ入力 ----------
const scanInput = document.getElementById('scanInput');
function focusScanner() { scanInput.value = ''; scanInput.focus(); }
document.addEventListener('click', focusScanner);
setInterval(() => {
  if (document.activeElement !== scanInput) scanInput.focus();
}, 2000);

scanInput.addEventListener('keydown', (e) => {
  if (e.key !== 'Enter') return;
  e.preventDefault();
  const raw = scanInput.value.trim();
  scanInput.value = '';
  if (!raw || busy) return;
  // QRの中身がURL(me.html直行)でもtoken単体でも受ける
  let token = raw;
  const m = raw.match(/[?&]token=([^&#]+)/);
  if (m) token = decodeURIComponent(m[1]);
  onScan(token);
});

// ---------- メインフロー ----------
async function onScan(token) {
  busy = true;
  try {
    const st = await jsonp({ mode: 'status', token });
    if (!st.ok) { showError(st.error === 'invalid token' ? 'QRコードが認識できません' : st.error); busy = false; return; }
    renderStaff(st, token);
    show('screenStaff');
    armReset(20000);
  } catch (err) {
    showError(String(err.message || err));
    busy = false;
  }
}

function renderStaff(st, token) {
  document.getElementById('staffName').textContent = st.name + ' さん';
  document.getElementById('staffState').textContent = STATE_LABEL[st.state] || st.state;

  const detail = [];
  if (st.checkin) detail.push('出勤 ' + st.checkin + (st.via ? '（' + st.via + '）' : ''));
  if (st.otStart) detail.push('時間外 ' + st.otStart + '〜' + (st.otEnd || ''));
  document.getElementById('staffDetail').textContent = detail.join(' ／ ');

  const area = document.getElementById('btnArea');
  area.innerHTML = '';
  const done = document.getElementById('doneMsg');
  done.style.display = 'none';

  const mk = (label, cls, action) => {
    const b = document.createElement('button');
    b.className = 'btn ' + cls;
    b.textContent = label;
    b.onclick = () => doPunch(token, action, label);
    area.appendChild(b);
  };

  switch (st.state) {
    case '未出勤':   mk('出勤する', 'btn-checkin', 'checkin'); break;
    case '出勤済み': mk('時間外勤務 開始', 'btn-otstart', 'otstart'); break;
    case '時間外中': mk('時間外勤務 終了', 'btn-otend', 'otend'); break;
    default:         done.style.display = 'block';
  }
}

async function doPunch(token, action, label) {
  clearTimeout(resetTimer);
  document.getElementById('btnArea').innerHTML =
    '<div style="font-size:24px;color:var(--sub);margin-top:28px;">記録中…</div>';
  try {
    const res = await jsonp({ mode: 'punch', token, action });
    if (!res.ok) {
      showError(res.error || 'エラー');
      if (res.status) { renderStaff(res.status, token); armReset(20000); }
      else goIdle();
      return;
    }
    document.getElementById('resultIcon').textContent = '✅';
    document.getElementById('resultText').textContent = res.name + ' さん ' + label;
    document.getElementById('resultSub').textContent = '記録しました';
    show('screenResult');
    armReset(3500);
  } catch (err) {
    showError(String(err.message || err));
    goIdle();
  }
}

goIdle();
</script>
</body>
</html>
