  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin:0; height:100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN", sans-serif;
      background:
        radial-gradient(120% 80% at 50% 0%, #FF3B30 0%, #E00000 55%, #C00000 100%);
      color:#fff;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      padding: env(safe-area-inset-top) 24px env(safe-area-inset-bottom);

      min-height:100vh;

      display:inline-block; width:100%; max-width:320px;
      padding:16px; font-size:18px; font-weight:600;
      color:#E00000; background:#fff; border:none; border-radius:16px;
      cursor:pointer; text-decoration:none;
      box-shadow: 0 6px 18px rgba(0,0,0,.25);
      transition: transform .1s, opacity .15s;
    }
    .btn:active { transform: scale(.97); opacity:.9; }
    .note { margin-top:22px; font-size:12px; opacity:.65; max-width:300px; line-height:1.5; }
  </style>
