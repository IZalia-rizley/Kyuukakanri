<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CORS疎通テスト</title>
  <style>
    body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN",sans-serif;
      background:#111;color:#eee;margin:0;padding:24px;line-height:1.6}
    h1{font-size:20px}
    button{padding:12px 20px;font-size:16px;font-weight:600;border:none;border-radius:10px;
      background:#E00000;color:#fff;cursor:pointer;margin:8px 0}
    pre{background:#000;padding:16px;border-radius:10px;white-space:pre-wrap;word-break:break-all;
      font-size:13px;border:1px solid #333;max-height:60vh;overflow:auto}
    .ok{color:#34C759}.ng{color:#FF453A}
    .row{margin:16px 0}
    input{width:100%;padding:10px;font-size:14px;border-radius:8px;border:1px solid #444;
      background:#000;color:#eee;box-sizing:border-box}
  </style>
</head>
<body>
  <h1>CORS疎通テスト</h1>

  <div class="row">
    <label>申請側 /exec URL（?以降は付けない）</label>
    <input id="gas" value="https://script.google.com/macros/s/AKfycbybMXUn5nsqUxitEClIAlYeA8gyhqSK80fVUMZW-T9nTf9enF1SaJ9Omw7LB0iOwls3/exec">
  </div>
  <div class="row">
    <label>token</label>
    <input id="tok" value="ippei">
  </div>

  <button onclick="test()">fetch してみる</button>

  <div class="row">
    <div id="verdict"></div>
    <pre id="out">ここに結果が出ます</pre>
  </div>

  <script>
    function test(){
      var gas = document.getElementById('gas').value.trim();
      var tok = document.getElementById('tok').value.trim();
      var url = gas + '?mode=mystatus&token=' + encodeURIComponent(tok);
      var out = document.getElementById('out');
      var verdict = document.getElementById('verdict');
      verdict.textContent = '';
      out.textContent = 'fetch中… → ' + url;

      // Content-Typeを付けない素のGET＝プリフライトを踏まない
      fetch(url, { method:'GET', redirect:'follow' })
        .then(function(res){
          out.textContent = 'HTTP ' + res.status + ' を受信。本文を読み込み中…';
          return res.text();
        })
        .then(function(text){
          // JSONとしてパースできるか試す
          try {
            var data = JSON.parse(text);
            verdict.innerHTML = '<b class="ok">✓ CORS成功・JSON取得OK</b>';
            out.textContent = JSON.stringify(data, null, 2);
          } catch(e) {
            verdict.innerHTML = '<b class="ng">△ 応答は来たがJSONじゃない（下記が中身）</b>';
            out.textContent = text.slice(0, 2000);
          }
        })
        .catch(function(err){
          verdict.innerHTML = '<b class="ng">✗ fetch失敗（CORSブロックの可能性）</b>';
          out.textContent = 'エラー: ' + err.name + ' — ' + err.message +
            '\n\n※ ブラウザのコンソール(F12)にCORSの詳細が出ていることが多いです。';
        });
    }
  </script>
</body>
</html>
