  <meta name="theme-color" content="#00C9FF">
  <title>マイページ</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    :root{ color-scheme: dark;
      --sky:#00C9FF; --mint:#92FE9D;
      --ink:#ffffff; --ink-sub:rgba(255,255,255,0.72); --line:rgba(255,255,255,0.12);
      --card:rgba(0,0,0,0.42); --accent:#E00000;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0}
    body{
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Hiragino Kaku Gothic ProN",sans-serif;
      color:var(--ink); min-height:100vh;
      background:linear-gradient(165deg,var(--sky) 0%,var(--mint) 100%);
      background-attachment:fixed;
      padding:env(safe-area-inset-top) 0 calc(env(safe-area-inset-bottom) + 44px);
      -webkit-font-smoothing:antialiased;
    }
    .wrap{max-width:520px;margin:0 auto;padding:0 18px}

    /* ヒーロー：透明（背景グラデがそのまま出る） */
    .hero{text-align:center;padding:42px 6px 8px}
    .hero .logo{width:64px;height:64px;border-radius:16px;box-shadow:0 8px 20px rgba(0,60,80,.28);margin-bottom:14px}
    .hero .greet{font-size:12px;font-weight:700;color:rgba(255,255,255,.92);margin:0 0 3px;
      letter-spacing:1.5px;text-transform:uppercase}
    .hero .name{font-size:31px;font-weight:800;margin:0;color:#fff;letter-spacing:.5px;line-height:1.1;
      text-shadow:0 2px 10px rgba(0,70,95,.3)}
    .hero .wave{display:inline-block;margin-left:6px}

    /* セクション見出し：グラデ地の上なので白 */
    .eyebrow{font-size:11px;font-weight:800;letter-spacing:1.5px;color:rgba(255,255,255,.9);
      text-transform:uppercase;margin:22px 6px 8px;text-shadow:0 1px 4px rgba(0,60,80,.2)}

    /* アコーディオン：白カードが浮く */
    .acc{background:var(--card);border-radius:16px;margin:10px 0;overflow:hidden;
      backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
      box-shadow:0 6px 18px rgba(0,80,110,.14)}
    .acc-head{display:flex;align-items:center;gap:12px;padding:16px 18px;cursor:pointer;user-select:none}
    .acc-head .ic{font-size:20px;width:24px;text-align:center;flex:0 0 auto}
    .acc-head .tt{flex:1 1 auto;font-size:17px;font-weight:600;color:var(--ink)}
    .acc-head .ar{font-size:15px;color:var(--ink-sub);transition:transform .2s}
    .acc.open .acc-head .ar{transform:rotate(90deg)}
    .acc-body{max-height:0;overflow:hidden;transition:max-height .28s ease}
    .acc.open .acc-body{max-height:1600px}
    .acc-inner{padding:0 18px 18px}

    /* CTA：グラデ地に白カード内なので、逆にソリッド濃色で締める */
    .big{display:block;width:100%;padding:15px;text-align:center;text-decoration:none;
      background:linear-gradient(135deg,var(--mint) 0%,var(--sky) 100%);
      color:#063a4d;font-size:17px;font-weight:700;border:none;border-radius:13px;cursor:pointer;
      box-shadow:0 5px 14px rgba(0,201,255,.35)}
    .big:active{opacity:.92;transform:scale(.99)}

    /* 申請状況 */
    .st-card{background:rgba(255,255,255,0.08);border:1px solid var(--line);border-radius:12px;padding:13px 14px;margin-top:10px}
    .st-card:first-child{margin-top:0}
    .st-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;gap:8px}
    .st-kind{font-size:16px;font-weight:700;color:var(--ink)}
    .badge{font-size:12px;font-weight:700;padding:3px 10px;border-radius:999px;white-space:nowrap}
    .b-wait{background:#FFF0C2;color:#8a6d00}
    .b-ok{background:#D6F7E2;color:#0f7a3d}
    .b-rej{background:#e9edf1;color:#5b6b7c}
    .b-cancelreq{background:#FFE4C4;color:#9a5300}
    .st-line{font-size:13px;color:var(--ink-sub);line-height:1.5}
    .st-line b{color:var(--ink);font-weight:600}
    .st-empty,.st-load{font-size:14px;color:var(--ink-sub);padding:6px 0}

    /* マイQR */
    .qr-wrap{display:flex;flex-direction:column;align-items:center;gap:12px;padding-top:2px}
    #qrbox{background:#fff;padding:12px;border-radius:14px;border:1px solid var(--line)}
    #qrbox canvas,#qrbox img{width:186px!important;height:186px!important;display:block}
    .qr-note{font-size:12px;color:var(--ink-sub);text-align:center;line-height:1.5}

    /* token無し */
    .guide{text-align:center;padding:64px 20px;color:#fff}
    .guide .logo{width:72px;height:72px;border-radius:17px;margin-bottom:20px;box-shadow:0 8px 20px rgba(0,60,80,.28)}
    .guide h2{font-size:20px;margin:0 0 8px}
    .guide p{font-size:14px;color:rgba(255,255,255,.9);line-height:1.6;margin:0}

    @media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
  </style>
</head>

    var token = new URLSearchParams(location.search).get("token") || "";

    function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]; }); }

    function greetWord(){
      var h = new Date().getHours();
      if(h < 5)  return "Good evening";
      if(h < 11) return "Good morning";
      if(h < 18) return "Hello";
      return "Good evening";
    }

    if(!token){
      document.getElementById('app').innerHTML =
        '<div class="wrap"><div class="guide">' +
        '<img class="logo" src="'+LOGO+'">' +
        '<h2>個人ページ</h2>' +
        '<p>配布されたQRコードから開くと、<br>あなた専用のページが表示されます。</p>' +
        '</div></div>';
    } else {
      renderShell();
      loadStatus();
    }

    function renderShell(){
      var applyUrl = GAS + '?token=' + encodeURIComponent(token);
      var html =
        '<div class="wrap">' +
          '<div class="hero">' +
            '<img class="logo" src="'+LOGO+'">' +
            '<p class="greet">'+esc(greetWord())+'</p>' +
            '<h1 class="name" id="nm">…<span class="wave">\u{1F44B}</span></h1>' +
          '</div>' +

          '<p class="eyebrow">Leave</p>' +
          '<div class="acc open">' +
            '<div class="acc-head" onclick="toggle(this)">' +
              '<span class="ic">\u{1F4DD}</span><span class="tt">休暇を申請する</span><span class="ar">\u203A</span>' +
            '</div>' +
            '<div class="acc-body"><div class="acc-inner">' +
              '<a class="big" href="'+applyUrl+'">申請フォームをひらく</a>' +
            '</div></div>' +
          '</div>' +

          '<p class="eyebrow">My Status</p>' +
          '<div class="acc" id="acc-st">' +
            '<div class="acc-head" onclick="toggle(this)">' +
              '<span class="ic">\u{1F5C2}\uFE0F</span><span class="tt">申請状況</span><span class="ar">\u203A</span>' +
            '</div>' +
            '<div class="acc-body"><div class="acc-inner" id="st-inner">' +
              '<div class="st-load">読み込み中…</div>' +
            '</div></div>' +
          '</div>' +

          '<p class="eyebrow">ID Pass</p>' +
          '<div class="acc">' +
            '<div class="acc-head" onclick="toggle(this); drawQR();">' +
              '<span class="ic">\u{1F3AB}</span><span class="tt">マイQR</span><span class="ar">\u203A</span>' +
            '</div>' +
            '<div class="acc-body"><div class="acc-inner">' +
              '<div class="qr-wrap">' +
                '<div id="qrbox"></div>' +
                '<p class="qr-note">出退勤の予備手段です。<br>読み取り機にかざしてください。</p>' +
              '</div>' +
            '</div></div>' +
          '</div>' +
        '</div>';
      document.getElementById('app').innerHTML = html;
    }

    function toggle(head){ head.parentNode.classList.toggle('open'); }

    var _qrDrawn = false;
    function drawQR(){
      if(_qrDrawn) return;
      var url = FRONT_BASE + '?token=' + encodeURIComponent(token);
      new QRCode(document.getElementById('qrbox'), {
        text:url, width:186, height:186, correctLevel:QRCode.CorrectLevel.M
      });
      _qrDrawn = true;
    }

    function statusCallback(data){
      var box = document.getElementById('st-inner');
      var nm = document.getElementById('nm');
      if(nm && data && data.name){ nm.innerHTML = esc(data.name)+'<span class="wave">\u{1F44B}</span>'; }
      if(!data || !data.ok){ box.innerHTML = '<div class="st-empty">読み込みに失敗しました。</div>'; return; }
      if(!data.rows || !data.rows.length){ box.innerHTML = '<div class="st-empty">申請はまだありません。</div>'; return; }
      var html = '';
      data.rows.forEach(function(r){
        var badge, cls;
        if(String(r.cancel).indexOf('取り消し') > -1){ badge='取り消し申請中'; cls='b-cancelreq'; }
        else if(r.status==='承認済み'){ badge='承認済み'; cls='b-ok'; }
        else if(r.status==='却下'){ badge='却下'; cls='b-rej'; }
        else { badge='承認待ち'; cls='b-wait'; }
        html +=
          '<div class="st-card">' +
            '<div class="st-top"><span class="st-kind">'+esc(r.type)+'</span>' +
              '<span class="badge '+cls+'">'+esc(badge)+'</span></div>' +
            '<div class="st-line"><b>'+esc(r.reason)+'</b></div>' +
            '<div class="st-line">'+esc(r.start)+' 〜 '+esc(r.end)+'</div>' +
            '<div class="st-line">申請 '+esc(r.applied)+
              (r.decided ? '　承認 '+esc(r.decided) : '') + '</div>' +
          '</div>';
      });
      box.innerHTML = html;
    }

    function loadStatus(){
      var s = document.createElement('script');
      s.src = GAS + '?mode=mystatus&token=' + encodeURIComponent(token) + '&callback=statusCallback';
      s.onerror = function(){
        var box = document.getElementById('st-inner');
        if(box) box.innerHTML = '<div class="st-empty">通信に失敗しました。</div>';
      };
      document.body.appendChild(s);
    }
  </script>
</body>
</html>
